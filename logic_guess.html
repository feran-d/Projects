<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Game</title>
</head>
<body>
    <p>Time Left:<span id="timeText"></span></p>
    <button id="startBtn">Start</button>
    <p>Question:<span id="question"></span></p>
    <button id="true">True</button>
    <button id="false">False</button><br><br>
     <button id="prev">Previous</button>
    <button id="next">Next</button>
   







<script>


const text = [
    "If jingo passes, then Bongo will study logic",
    "It is not the case that Bamaanga will pass if and only if he studies",
    "if ETR students study, then they will not fail"
];





let timer = document.getElementById("timeText");
let startbtn = document.getElementById("startBtn");
let quesText = document.getElementById("question");
let truthBtn = document.getElementById("true");
let falseBtn = document.getElementById("false");



// const nextBtn = document.getElementById("next");
// const prevBtn = document.getElementById("prev");

// let text = "If jingo passes, then Bongo will study logic";




let count = 0;
quesText.innerHTML = text[count];
 console.log(text.length);

nextBtn.onclick = function(){
    if(count < text.length - 1){
        count++;
    quesText.innerHTML = text[count];
}

}


prevBtn.onclick = function() {
    if(count > 0)
    count--;
quesText.innerHTML = text[count];
}



let num = 60;
timer.innerHTML =  num;

 startbtn.onclick = function(){   
    
    startbtn.setAttribute("disabled", true) // This is used to disable the start button using the setAttribute function
   let interval =  setInterval(() => {
        num = num-1;
        timer.innerHTML = num;
        if(num == 55){
            num = 0; //used to return to the default count digit
            clearInterval(interval);
        //    alert("Game up");
           setTimeout(() => {
            location.href = "logic_menu.html";
           }, 500);
           
timer.innerHTML = num; 
// startbtn.removeAttribute("disabled")
        }
    }, 1000);



 }

truthBtn.onclick = function(){
    if(true){
        alert("You got it");
    }
}

falseBtn.onclick = function(){
    if(true){
        alert("You picked the wrong option");
    }
}

</script>

</body>
</html>
